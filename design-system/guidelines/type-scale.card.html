<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-surface); font-family: var(--font-display); color: var(--text-strong); }
  .wrap { padding: var(--space-5) var(--space-6); display: grid; gap: 6px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .tag { font-family: var(--font-body); font-size: 10px; color: var(--text-muted); width: 70px; flex: none; letter-spacing: .04em; }
  .spec { font-weight: 700; line-height: 1.1; white-space: nowrap; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><span class="tag">5xl · 76</span><span class="spec" style="font-size:var(--text-5xl)">Aa</span></div>
    <div class="row"><span class="tag">4xl · 60</span><span class="spec" style="font-size:var(--text-4xl)">Bildung</span></div>
    <div class="row"><span class="tag">3xl · 46</span><span class="spec" style="font-size:var(--text-3xl)">Handelsakademie</span></div>
    <div class="row"><span class="tag">2xl · 36</span><span class="spec" style="font-size:var(--text-2xl)">Gemeinsam Zukunft</span></div>
    <div class="row"><span class="tag">xl · 28</span><span class="spec" style="font-size:var(--text-xl)">Praxisnahe Wirtschaft</span></div>
    <div class="row"><span class="tag">lg · 22</span><span class="spec" style="font-size:var(--text-lg)">Unternehmerisch denken</span></div>
    <div class="row"><span class="tag">base · 16</span><span class="spec" style="font-size:var(--text-base); font-family:var(--font-body); font-weight:400">Body copy uses Open Sans at sixteen pixels.</span></div>
  </div>
</body>
</html>
