<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation / shadows" subtitle="Cool, low-spread shadows tinted toward night blue" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-body); }
  .wrap { padding: var(--space-6) var(--space-6); display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .item { text-align: center; }
  .box { width: 92px; height: 60px; background: var(--color-surface); border-radius: var(--radius-md); }
  .lbl { font-size: 11px; color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lbl">xs</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lbl">sm</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lbl">md</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lbl">lg</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="lbl">xl</div></div>
  </div>
</body>
</html>
