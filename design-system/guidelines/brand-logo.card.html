<!-- @dsCard group="Brand" viewport="700x300" name="Logo — primary lockups" subtitle="Horizontal & vertical, with claim" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-surface); font-family: var(--font-body); }
  .wrap { padding: var(--space-6); display: grid; grid-template-columns: 1.4fr 1fr; gap: var(--space-6); align-items: center; }
  .cell { display: flex; align-items: center; justify-content: center; }
  .cell img { max-width: 100%; max-height: 220px; }
  .lbl { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 10px; letter-spacing: .04em; }
</style>
</head>
<body>
  <div class="wrap">
    <div><div class="cell"><img src="../assets/logos/johak-horizontal-claim.png" alt="JO.HAK horizontal" /></div><div class="lbl">Horizontal · mit Claim</div></div>
    <div><div class="cell"><img src="../assets/logos/johak-vertical-claim.png" alt="JO.HAK vertical" /></div><div class="lbl">Vertikal · mit Claim</div></div>
  </div>
</body>
</html>
