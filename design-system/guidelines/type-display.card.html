<!-- @dsCard group="Type" viewport="700x230" name="Coco Gothic — Display" subtitle="Headline typeface · weights 200 / 400 / 700 / 900" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-surface); font-family: var(--font-display); color: var(--text-strong); }
  .wrap { padding: var(--space-5) var(--space-6); }
  .big { font-size: 58px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; margin: 0; }
  .sub { font-family: var(--font-body); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--color-primary); font-weight: 600; margin-bottom: 10px; }
  .weights { display: flex; gap: 22px; margin-top: 18px; flex-wrap: wrap; }
  .w { font-size: 26px; }
  .w span { display: block; font-family: var(--font-body); font-size: 10px; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; margin-top: 2px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sub">Coco Gothic · Headline</div>
    <p class="big">Gemeinsam Zukunft bilden</p>
    <div class="weights">
      <div class="w" style="font-weight:200">Aa<span>UltraLight 200</span></div>
      <div class="w" style="font-weight:400">Aa<span>Regular 400</span></div>
      <div class="w" style="font-weight:700">Aa<span>Bold 700</span></div>
      <div class="w" style="font-weight:900">Aa<span>Heavy 900</span></div>
    </div>
  </div>
</body>
</html>
