<!-- @dsCard group="Colors" viewport="700x190" name="Brand primaries" subtitle="Farbe 1–4 — sky, petrol, signal red, amber" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-surface); font-family: var(--font-body); }
  .wrap { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-3); padding: var(--space-5); }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 74px; }
  .meta { padding: 10px 12px; }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--text-strong); }
  .hex { font-size: 12px; color: var(--text-muted); letter-spacing: .02em; }
  .role { font-size: 11px; color: var(--text-subtle); margin-top: 2px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:var(--johak-sky)"></div><div class="meta"><div class="name">Sky</div><div class="hex">#80CCDB</div><div class="role">Farbe 1 · hellblau</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--johak-petrol)"></div><div class="meta"><div class="name">Petrol</div><div class="hex">#005577</div><div class="role">Farbe 2 · primary</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--johak-red)"></div><div class="meta"><div class="name">Signal Red</div><div class="hex">#E4003A</div><div class="role">Farbe 3 · accent</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--johak-amber)"></div><div class="meta"><div class="name">Amber</div><div class="hex">#F7A823</div><div class="role">Farbe 4 · highlight</div></div></div>
  </div>
</body>
</html>
