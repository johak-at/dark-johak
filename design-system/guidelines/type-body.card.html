<!-- @dsCard group="Type" viewport="700x230" name="Open Sans — Body / UI" subtitle="Readable humanist grotesque · matches johak.at" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-surface); font-family: var(--font-body); color: var(--text-body); }
  .wrap { padding: var(--space-5) var(--space-6); }
  .sub { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--color-primary); font-weight: 600; margin-bottom: 12px; }
  p { margin: 0 0 10px; max-width: 60ch; }
  .lead { font-size: 17px; color: var(--text-strong); font-weight: 500; }
  .base { font-size: 14px; }
  .weights { font-size: 14px; color: var(--text-muted); }
  .weights b { color: var(--text-strong); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sub">Open Sans · Body &amp; UI</div>
    <p class="lead">Die Handelsakademie verbindet wirtschaftliche Bildung mit Persönlichkeit.</p>
    <p class="base">In der HAK lernen junge Menschen praxisnah, unternehmerisch zu denken und Verantwortung zu übernehmen — bodenständig, weltoffen und am Puls der Zeit.</p>
    <p class="weights"><span style="font-weight:300">Light</span> · <span style="font-weight:400">Regular</span> · <span style="font-weight:500">Medium</span> · <b style="font-weight:600">SemiBold</b> · <b style="font-weight:700">Bold</b></p>
  </div>
</body>
</html>
