<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radii" subtitle="Soft, confident rounding echoing the signet" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-surface); font-family: var(--font-body); }
  .wrap { padding: var(--space-5) var(--space-6); display: flex; gap: 18px; align-items: flex-end; flex-wrap: wrap; }
  .item { text-align: center; }
  .box { width: 72px; height: 56px; background: var(--sky-100); border: 2px solid var(--color-sky); }
  .lbl { font-size: 11px; color: var(--text-muted); margin-top: 8px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="lbl">xs · 4</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lbl">sm · 8</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lbl">md · 12</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lbl">lg · 18</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lbl">xl · 26</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="lbl">2xl · 36</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="lbl">pill</div></div>
  </div>
</body>
</html>
