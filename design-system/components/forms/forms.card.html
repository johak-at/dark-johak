<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-body); }
  #root { padding: var(--space-6); display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); font-weight: 600; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input, Checkbox, Switch } = window.JOHAKDesignSystem_350c1a;
  function Demo() {
    const [news, setNews] = React.useState(true);
    const [agb, setAgb] = React.useState(false);
    return (
      <>
        <div className="stack">
          <span className="label">Inputs</span>
          <Input label="E-Mail" type="email" placeholder="name@johak.at" hint="Wir antworten binnen 2 Tagen." />
          <Input label="Name" placeholder="Vor- und Nachname" error="Bitte ausfüllen" />
        </div>
        <div className="stack">
          <span className="label">Toggles</span>
          <Switch checked={news} onChange={setNews} label="Newsletter abonnieren" />
          <Switch checked={false} onChange={() => {}} label="SMS-Benachrichtigung" />
          <Checkbox checked={agb} onChange={setAgb} label="Ich stimme den AGB zu" />
          <Checkbox checked={true} onChange={() => {}} label="Fotoerlaubnis erteilt" />
          <Checkbox checked={false} onChange={() => {}} disabled label="Option deaktiviert" />
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
