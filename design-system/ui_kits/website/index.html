<!-- @startingPoint section="Website" subtitle="JO.HAK school homepage with anmeldung flow" viewport="1320x900" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JO.HAK — Gemeinsam Zukunft bilden</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); }
  .johak-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(16,33,41,0.55); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; padding: 24px;
    animation: fade 180ms ease;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop { from { transform: translateY(12px) scale(.98); opacity: 0; } to { transform: none; opacity: 1; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="image-slot.js"></script>
<script type="text/babel" src="SiteHeader.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Programs.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel">
  const { Button, Input, Checkbox, Card, Logo } = window.JOHAKDesignSystem_350c1a;
  const { SiteHeader, Hero, Programs, Spirit, News, SiteFooter } = window;

  function AnmeldungModal({ onClose }) {
    const [sent, setSent] = React.useState(false);
    return (
      <div className="johak-overlay" onClick={onClose}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 460, animation: "pop 220ms cubic-bezier(0.16,1,0.3,1)" }}>
          <Card accent="signet" elevation="lg" padding="lg">
            {!sent ? (
              <>
                <h3 style={{ fontSize: "var(--text-xl)", margin: "4px 0 4px", color: "var(--text-strong)" }}>Anmeldung 2026/27</h3>
                <p style={{ fontSize: "var(--text-sm)", color: "var(--text-muted)", margin: "0 0 20px" }}>
                  Wir melden uns binnen zwei Werktagen bei dir.
                </p>
                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                  <Input label="Name des Kindes" placeholder="Vor- und Nachname" />
                  <Input label="E-Mail der Eltern" type="email" placeholder="name@example.at" />
                  <Checkbox checked={true} onChange={() => {}} label="Ich stimme der Datenschutzerklärung zu" />
                  <div style={{ display: "flex", gap: 10, marginTop: 6 }}>
                    <Button variant="primary" fullWidth onClick={() => setSent(true)}>Absenden</Button>
                    <Button variant="ghost" onClick={onClose}>Abbrechen</Button>
                  </div>
                </div>
              </>
            ) : (
              <div style={{ textAlign: "center", padding: "12px 0" }}>
                <div style={{ width: 56, height: 56, borderRadius: "50%", background: "var(--color-success-soft)", color: "var(--color-success)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", fontSize: 28 }}>✓</div>
                <h3 style={{ fontSize: "var(--text-xl)", margin: "0 0 6px", color: "var(--text-strong)" }}>Danke!</h3>
                <p style={{ fontSize: "var(--text-sm)", color: "var(--text-muted)", margin: "0 0 20px" }}>Deine Anmeldung ist eingegangen.</p>
                <Button variant="primary" onClick={onClose}>Schließen</Button>
              </div>
            )}
          </Card>
        </div>
      </div>
    );
  }

  function App() {
    const [modal, setModal] = React.useState(false);
    const open = () => setModal(true);
    return (
      <>
        <SiteHeader onAnmelden={open} />
        <Hero onAnmelden={open} onVideo={open} />
        <Programs />
        <Spirit />
        <News />
        <SiteFooter />
        {modal && <AnmeldungModal onClose={() => setModal(false)} />}
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
